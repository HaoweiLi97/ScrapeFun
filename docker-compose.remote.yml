services:
  app:
    image: ${SCRAPETAB_IMAGE:-haoweil/scrapefun:latest}
    container_name: scrapefun
    network_mode: "host"
    env_file:
      - ./server.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/db/dev.db
      # With network_mode: host, we access other containers via localhost ports
      - FLARESOLVERR_URL=http://127.0.0.1:8191/v1
      - UPDATE_CURRENT_TAG=${UPDATE_CURRENT_TAG:-latest}
      - UPDATE_WEBHOOK_URL=${UPDATE_WEBHOOK_URL:-http://127.0.0.1:4182/update}
      - UPDATE_WEBHOOK_TOKEN=${SCRAPETAB_UPDATER_TOKEN:-}
    volumes:
      - scrapefun_db:/app/data/db
      - scrapefun_images:/app/data/images
      - scrapefun_config:/app/data/config
      - scrapefun_local_subtitles:/app/data/local-subtitles
    restart: unless-stopped

  updater:
    image: ${SCRAPETAB_IMAGE:-haoweil/scrapefun:latest}
    container_name: scrapefun-updater
    working_dir: /workspace
    command: ["node", "/app/updater/server.cjs"]
    environment:
      - UPDATER_PORT=4182
      - UPDATER_TOKEN=${SCRAPETAB_UPDATER_TOKEN:-}
      - UPDATER_PROJECT_DIR=/workspace
      - UPDATER_COMPOSE_FILE=/workspace/docker-compose.remote.yml
      - UPDATER_SERVICE_NAME=app
      - UPDATER_HEALTHCHECK_URL=http://127.0.0.1:4000/health
      - UPDATER_STATE_ENV_FILE=/workspace/.updater.env
      - UPDATER_REPOSITORY=${UPDATE_DOCKERHUB_REPO:-haoweil/scrapefun}
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:4182:4182"
    restart: unless-stopped

volumes:
  scrapefun_db:
  scrapefun_images:
  scrapefun_config:
  scrapefun_local_subtitles:
